services:
  backend:
    build: ./backend
    container_name: aegis-backend
    ports:
      - "8000:8000"
    environment:
      AEGIS_CORS_ORIGINS: "http://localhost:5173,http://localhost:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: aegis-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
